<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen a Candidate - HireAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="max-w-3xl mx-auto mt-10 p-6 bg-slate-800 rounded-xl">

    <h1 class="text-2xl font-bold mb-6">Screen Candidate</h1>

    <!-- Job Description -->
    <textarea id="jobDescription" placeholder="Paste job description..."
        class="w-full p-3 mb-6 bg-slate-700 rounded"></textarea>

    <!-- Upload Section -->
    <div id="resumeDropZone" class="border-2 border-dashed p-8 text-center cursor-pointer rounded-lg">

        <!-- ✅ IMPORTANT: input OUTSIDE -->
        <input type="file" id="resumeFile" accept=".pdf,.txt" class="hidden">

        <div id="dropZoneContent">
            <p>Drag & Drop Resume OR Click</p>
        </div>

        <div id="selectedFile" class="hidden">
            <p id="filename"></p>
            <button type="button">Remove</button>
        </div>
    </div>

    <!-- Paste Resume -->
    <textarea id="resumeText" placeholder="Or paste resume text..."
        class="w-full p-3 mt-6 bg-slate-700 rounded"></textarea>

    <!-- Button -->
    <button onclick="screenNow()"
        class="mt-6 px-6 py-3 bg-purple-600 rounded">
        Screen Now
    </button>

</div>

<script src="app.js"></script>
</body>
</html>
